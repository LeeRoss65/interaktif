<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kuiz Bahasa Melayu</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-image: url('bg1.jpg');
      margin: 0;
      padding: 20px;
    }

    .container {
      max-width: 800px;
      margin: auto;
      background: beige;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    h1 {
      text-align: center;
    }

    #scoreBoard {
      font-size: 1.2em;
      margin-bottom: 20px;
      font-weight: bold;
      color: #006400;
    }

    #question {
      font-size: 1.3em;
      margin-bottom: 20px;
    }

    .option {
      display: block;
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: none;
      border-radius: 5px;
      background: #007BFF;
      color: white;
      cursor: pointer;
      font-size: 1em;
      transition: 0.2s;
    }

    .option:hover {
      background: #0056b3;
    }

    .correct {
      background: #28a745 !important;
    }

    .wrong {
      background: #dc3545 !important;
    }

    #nextBtn {
      margin-top: 20px;
      padding: 10px 20px;
      font-size: 1em;
      border: none;
      border-radius: 5px;
      background: #333;
      color: white;
      cursor: pointer;
      display: none;
    }

    #fileInput {
      margin-bottom: 20px;
    }

    #status {
      margin-top: 10px;
      color: #444;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>Kuiz Bahasa</h1>

  <input type="file" id="fileInput" accept=".txt">
  <div id="status">Pilih fail soalan.</div>

  <div id="scoreBoard">Markah: 0</div>

  <div id="quizContainer" style="display:none;">
    <div id="question"></div>
    <div id="options"></div>
    <button id="nextBtn">Soalan seterusnya</button>
  </div>
</div>

<script>
  let questions = [];
  let currentQuestionIndex = 0;
  let score = 0;
  let attemptCount = 0;
  let firstTry = true;

  const fileInput = document.getElementById("fileInput");
  const questionEl = document.getElementById("question");
  const optionsEl = document.getElementById("options");
  const scoreBoard = document.getElementById("scoreBoard");
  const nextBtn = document.getElementById("nextBtn");
  const quizContainer = document.getElementById("quizContainer");
  const statusEl = document.getElementById("status");

  fileInput.addEventListener("change", loadFile);

  function loadFile(event) {
    const file = event.target.files[0];

    if (!file) return;

    const reader = new FileReader();

    reader.onload = function(e) {
      parseQuiz(e.target.result);
    };

    reader.readAsText(file);
  }

  function parseQuiz(text) {
    questions = [];

    const lines = text
      .split(/\r?\n/)
      .map(line => line.trim())
      .filter(line => line !== "");

    for (let i = 0; i < lines.length; i += 6) {
      if (i + 5 >= lines.length) break;

      questions.push({
        question: lines[i],
        options: [
          lines[i + 1],
          lines[i + 2],
          lines[i + 3],
          lines[i + 4]
        ],
        answer: lines[i + 5]
      });
    }

    shuffleArray(questions);

    currentQuestionIndex = 0;
    score = 0;
    updateScore();

    statusEl.textContent = `Terdapat ${questions.length} soalan.`;
    quizContainer.style.display = "block";

    showQuestion();
  }

  function showQuestion() {
    nextBtn.style.display = "none";
    optionsEl.innerHTML = "";

    attemptCount = 0;
    firstTry = true;

    const current = questions[currentQuestionIndex];

    questionEl.textContent =
      `Q${currentQuestionIndex + 1}. ${current.question}`;

    let shuffledOptions = [...current.options];
    shuffleArray(shuffledOptions);

    shuffledOptions.forEach(option => {
      const btn = document.createElement("button");
      btn.classList.add("option");
      btn.textContent = option;

      btn.addEventListener("click", () => checkAnswer(btn, option));

      optionsEl.appendChild(btn);
    });
  }

  function checkAnswer(button, selected) {
    const current = questions[currentQuestionIndex];
    const buttons = document.querySelectorAll(".option");

    attemptCount++;

    if (selected === current.answer) {
      button.classList.add("correct");

      if (firstTry) {
        score += 2;
      } else {
        score += 1;
      }

      updateScore();

      buttons.forEach(btn => btn.disabled = true);

      nextBtn.style.display = "inline-block";
    } else {
      button.classList.add("wrong");
      button.disabled = true;

      firstTry = false;
    }
  }

  nextBtn.addEventListener("click", () => {
    currentQuestionIndex++;

    if (currentQuestionIndex < questions.length) {
      showQuestion();
    } else {
      questionEl.textContent = "Kuiz telah diselesaikan!";
      optionsEl.innerHTML = "";
      nextBtn.style.display = "none";

      statusEl.textContent =
        `Markah Penuh: ${questions.length * 2}`;
    }
  });

  function updateScore() {
    scoreBoard.textContent = `Markah anda: ${score}`;
  }

  function shuffleArray(array) {
    for (let i = array.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [array[i], array[j]] = [array[j], array[i]];
    }
  }
</script>

</body>
</html>
