<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Randomized MCQ Quiz</title>

<style>
    body{
        font-family: Arial, sans-serif;
        background:#f4f4f4;
        margin:0;
        padding:20px;
    }

    .container{
        max-width:800px;
        margin:auto;
        background:white;
        padding:25px;
        border-radius:10px;
        box-shadow:0 0 10px rgba(0,0,0,0.1);
    }

    h1{
        text-align:center;
    }

    #scoreBoard{
        font-size:20px;
        font-weight:bold;
        margin-bottom:20px;
        color:#0066cc;
    }

    .question{
        font-size:22px;
        margin-bottom:20px;
    }

    .option{
        display:block;
        width:100%;
        padding:12px;
        margin:10px 0;
        border:none;
        border-radius:8px;
        background:#e8e8e8;
        cursor:pointer;
        font-size:16px;
        transition:0.2s;
    }

    .option:hover{
        background:#d0d0d0;
    }

    .correct{
        background:#4CAF50 !important;
        color:white;
    }

    .wrong{
        background:#e53935 !important;
        color:white;
    }

    #nextBtn{
        margin-top:20px;
        padding:12px 20px;
        font-size:16px;
        border:none;
        border-radius:8px;
        background:#0066cc;
        color:white;
        cursor:pointer;
        display:none;
    }

    #result{
        font-size:24px;
        text-align:center;
        margin-top:20px;
        font-weight:bold;
    }

    #fileInput{
        margin-bottom:20px;
    }

    .attemptInfo{
        margin-top:10px;
        color:#555;
    }
</style>
</head>

<body>

<div class="container">
    <h1>Randomized Multiple Choice Quiz</h1>

    <input type="file" id="fileInput" accept=".txt">

    <div id="scoreBoard">Score: 0</div>

    <div id="quizBox" style="display:none;">
        <div class="question" id="question"></div>

        <div id="options"></div>

        <div class="attemptInfo" id="attemptInfo"></div>

        <button id="nextBtn">Next Question</button>
    </div>

    <div id="result"></div>
</div>

<script>
let quizData = [];
let currentQuestionIndex = 0;
let score = 0;
let currentAttempts = 0;

const questionEl = document.getElementById("question");
const optionsEl = document.getElementById("options");
const nextBtn = document.getElementById("nextBtn");
const scoreBoard = document.getElementById("scoreBoard");
const resultEl = document.getElementById("result");
const quizBox = document.getElementById("quizBox");
const attemptInfo = document.getElementById("attemptInfo");

document.getElementById("fileInput").addEventListener("change", loadFile);

function loadFile(event){
    const file = event.target.files[0];

    if(!file) return;

    const reader = new FileReader();

    reader.onload = function(e){
        parseQuizData(e.target.result);

        shuffleArray(quizData);

        currentQuestionIndex = 0;
        score = 0;

        updateScore();

        quizBox.style.display = "block";
        resultEl.innerHTML = "";

        loadQuestion();
    };

    reader.readAsText(file);
}

function parseQuizData(text){
    quizData = [];

    // Question format:
    // Question|Option1|Option2|Option3|Option4|CorrectAnswer

    const lines = text.trim().split("\n");

    lines.forEach(line => {
        const parts = line.split("|");

        if(parts.length === 6){
            quizData.push({
                question: parts[0],
                options: [parts[1], parts[2], parts[3], parts[4]],
                answer: parts[5]
            });
        }
    });
}

function loadQuestion(){
    nextBtn.style.display = "none";
    currentAttempts = 0;

    const currentQ = quizData[currentQuestionIndex];

    questionEl.innerText = currentQ.question;

    let shuffledOptions = [...currentQ.options];
    shuffleArray(shuffledOptions);

    optionsEl.innerHTML = "";

    shuffledOptions.forEach(option => {
        const btn = document.createElement("button");
        btn.classList.add("option");
        btn.innerText = option;

        btn.addEventListener("click", () => checkAnswer(btn, option));

        optionsEl.appendChild(btn);
    });

    attemptInfo.innerText = "Attempts remaining: 3";
}

function checkAnswer(button, selected){
    const currentQ = quizData[currentQuestionIndex];

    currentAttempts++;

    if(selected === currentQ.answer){

        button.classList.add("correct");

        let awarded = 0;

        if(currentAttempts === 1){
            awarded = 2;
        } else if(currentAttempts === 2){
            awarded = 1;
        } else if(currentAttempts === 3){
            awarded = 0.5;
        }

        score += awarded;

        updateScore();

        disableOptions();

        attemptInfo.innerText =
            `Correct! Awarded ${awarded} mark(s).`;

        nextBtn.style.display = "inline-block";

    } else {

        button.classList.add("wrong");
        button.disabled = true;

        if(currentAttempts >= 3){

            revealCorrectAnswer();

            disableOptions();

            attemptInfo.innerText =
                `No more attempts. Correct answer: ${currentQ.answer}`;

            nextBtn.style.display = "inline-block";

        } else {

            attemptInfo.innerText =
                `Wrong attempt ${currentAttempts}/3`;
        }
    }
}

function revealCorrectAnswer(){
    const buttons = document.querySelectorAll(".option");

    buttons.forEach(btn => {
        if(btn.innerText === quizData[currentQuestionIndex].answer){
            btn.classList.add("correct");
        }
    });
}

function disableOptions(){
    const buttons = document.querySelectorAll(".option");

    buttons.forEach(btn => {
        btn.disabled = true;
    });
}

nextBtn.addEventListener("click", () => {
    currentQuestionIndex++;

    if(currentQuestionIndex < quizData.length){
        loadQuestion();
    } else {
        showFinalResult();
    }
});

function updateScore(){
    scoreBoard.innerText = `Score: ${score}`;
}

function showFinalResult(){
    quizBox.style.display = "none";

    resultEl.innerHTML =
        `Quiz Completed!<br><br>Final Score: ${score}`;
}

function shuffleArray(array){
    for(let i = array.length - 1; i > 0; i--){
        const j = Math.floor(Math.random() * (i + 1));

        [array[i], array[j]] = [array[j], array[i]];
    }
}
</script>

</body>
</html>
