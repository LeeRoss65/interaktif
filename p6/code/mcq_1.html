<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Multiple Choice Quiz</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        .question {
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <h1>Multiple Choice Quiz</h1>
    <p id="score">Score: 0 marks</p>
    <p id="question"></p>
    <button onclick="nextQuestion()">Next Question</button>
    <script>
        let currentQuestion = 0;
        let score = 0;
        const questionsFile = 'https://bahan.netlify.app/p6/code/questions.txt';
        const questions = {};
        const answers = {};

        // Read questions from file
        function readQuestions() {
            fetch(questionsFile)
                .then(response => response.text())
                .then(text => {
                    const lines = text.split('\n');
                    const questionLines = [];
                    for (let i = 0; i < lines.length; i++) {
                        if (lines[i].trim() !== '') {
                            questionLines.push(lines[i].trim());
                        }
                    }
                    // Group lines into questions
                    for (let i = 0; i < questionLines.length; i += 5) {
                        const question = {
                            question: questionLines[i],
                            options: [questionLines[i + 1], questionLines[i + 2], questionLines[i + 3], questionLines[i + 4]],
                            answer: questionLines[i + 4],
                        };
                        questions[currentQuestion] = question;
                        answers[currentQuestion] = question.answer;
                        currentQuestion++;
                    }
                })
                .catch(error => console.error('Error reading questions:', error));
        }

        // Display questions
        function displayQuestion() {
            const question = questions[currentQuestion];
            if (question) {
                const questionElement = document.getElementById('question');
                questionElement.innerText = question.question;
                const optionElements = question.options.map((option, index) => {
                    const button = document.createElement('button');
                    button.innerText = option;
                    button.onclick = () => checkAnswer(index);
                    return button;
                });
                questionElement.appendChild(optionElements[0]);
                for (let i = 1; i < optionElements.length; i++) {
                    optionElements[i].style.display = 'none';
                    questionElement.appendChild(optionElements[i]);
                }
            }
        }

        // Check if answer is correct
        function checkAnswer(index) {
            const correctAnswer = answers[currentQuestion];
            const chosenAnswer = questions[currentQuestion].options[index];
            if (chosenAnswer === correctAnswer) {
                let marks = 2;
                if (score === 1) {
                    marks = 1;
                } else if (score === 2) {
                    marks = 0.5;
                }
                score += marks;
                document.getElementById('score').innerText = `Score: ${score} marks`;
                nextQuestion();
            } else {
                displayQuestion();
            }
        }

        // Next question
        function nextQuestion() {
            displayQuestion();
        }

        // Start quiz
        readQuestions();
        displayQuestion();
    </script>
</body>
</html>
